<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מי רוצה להיות מיליונר - התסריט הראשון של סבק</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap');

        body {
            font-family: 'Heebo', sans-serif;
            background: radial-gradient(circle at center, #1b2055 0%, #060814 100%);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .millionaire-shape {
            clip-path: polygon(5% 0, 95% 0, 100% 50%, 95% 100%, 5% 100%, 0 50%);
            background: linear-gradient(to bottom, #000000, #131244);
            border: 2px solid #ce983b;
            position: relative;
            transition: all 0.3s ease;
        }

        .millionaire-shape::before {
            content: '';
            position: absolute;
            top: 2px; left: 5%; right: 5%; bottom: 2px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            pointer-events: none;
        }

        .millionaire-shape:hover:not(.locked) {
            background: linear-gradient(to bottom, #000000, #2c2a8c);
            cursor: pointer;
            border-color: #ffd700;
        }

        .answer-btn.selected {
            background: linear-gradient(to bottom, #b46b00, #e69500);
            border-color: #fff;
        }

        .answer-btn.correct {
            background: linear-gradient(to bottom, #005a00, #00a800);
            border-color: #fff;
            animation: blinkCorrect 0.5s 4;
        }

        .answer-btn.wrong {
            background: linear-gradient(to bottom, #6b0000, #c40000);
            border-color: #fff;
        }

        @keyframes blinkCorrect {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .ladder-item {
            color: #d1b87a;
            transition: all 0.3s;
        }
        
        .ladder-item.active {
            color: #ffffff;
            background-color: #c48300;
            border-radius: 9999px;
            font-weight: bold;
        }

        .ladder-item.passed {
            color: #6366f1;
        }

        .question-box {
            clip-path: polygon(3% 0, 97% 0, 100% 50%, 97% 100%, 3% 100%, 0 50%);
            background: linear-gradient(to bottom, #000000, #131244);
            border: 2px solid #ce983b;
        }

        /* Responsive adjustments for mobile clip-paths */
        @media (max-width: 640px) {
            .millionaire-shape { clip-path: polygon(8% 0, 92% 0, 100% 50%, 92% 100%, 8% 100%, 0 50%); }
            .question-box { clip-path: polygon(5% 0, 95% 0, 100% 50%, 95% 100%, 5% 100%, 0 50%); }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4 text-center">

    <!-- Header -->
    <div class="w-full max-w-5xl flex justify-between items-center mb-8 relative z-10">
        <div class="text-3xl font-black text-yellow-400 drop-shadow-md hidden md:block">
            מי רוצה להיות מיליונר?
        </div>
        <div class="text-xl md:text-2xl font-bold text-white flex items-center gap-2">
            <span>התסריט הראשון של סבק</span>
            <span class="text-yellow-500">🎬</span>
        </div>
    </div>

    <!-- Main Game Area -->
    <div class="w-full max-w-5xl flex flex-col lg:flex-row gap-8 relative z-10" id="game-container">
        
        <!-- Game Board -->
        <div class="flex-1 flex flex-col justify-end">
            
            <!-- Question Box -->
            <div class="question-box p-6 md:p-10 mb-8 flex items-center justify-center min-h-[120px] shadow-2xl">
                <h2 id="question-text" class="text-xl md:text-2xl font-bold text-white tracking-wide leading-relaxed">
                    טוען שאלה...
                </h2>
            </div>

            <!-- Answers Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="answers-container">
                <button onclick="selectAnswer(0)" class="answer-btn millionaire-shape p-4 text-lg md:text-xl font-semibold flex items-center text-right group">
                    <span class="text-yellow-500 mr-4 ml-2 group-hover:text-yellow-300">א:</span> 
                    <span id="ans-0-text" class="flex-1">תשובה</span>
                </button>
                <button onclick="selectAnswer(1)" class="answer-btn millionaire-shape p-4 text-lg md:text-xl font-semibold flex items-center text-right group">
                    <span class="text-yellow-500 mr-4 ml-2 group-hover:text-yellow-300">ב:</span> 
                    <span id="ans-1-text" class="flex-1">תשובה</span>
                </button>
                <button onclick="selectAnswer(2)" class="answer-btn millionaire-shape p-4 text-lg md:text-xl font-semibold flex items-center text-right group">
                    <span class="text-yellow-500 mr-4 ml-2 group-hover:text-yellow-300">ג:</span> 
                    <span id="ans-2-text" class="flex-1">תשובה</span>
                </button>
                <button onclick="selectAnswer(3)" class="answer-btn millionaire-shape p-4 text-lg md:text-xl font-semibold flex items-center text-right group">
                    <span class="text-yellow-500 mr-4 ml-2 group-hover:text-yellow-300">ד:</span> 
                    <span id="ans-3-text" class="flex-1">תשובה</span>
                </button>
            </div>
        </div>

        <!-- Money Ladder (Sidebar) -->
        <div class="w-full lg:w-64 bg-black/40 border border-blue-800 rounded-2xl p-6 hidden sm:flex flex-col justify-between order-first lg:order-last">
            <h3 class="text-yellow-500 font-bold mb-4 text-center border-b border-yellow-500/30 pb-2">סולם הפרסים</h3>
            <ul id="ladder" class="flex flex-col-reverse gap-2 text-lg">
                <!-- Generated by JS -->
            </ul>
        </div>
    </div>

    <!-- End Screen (Hidden by default) -->
    <div id="end-screen" class="hidden flex-col items-center justify-center bg-black/80 fixed inset-0 z-50 p-6 text-center">
        <h1 id="end-title" class="text-5xl md:text-7xl font-black mb-6 drop-shadow-[0_0_20px_rgba(255,215,0,0.8)]"></h1>
        <p id="end-message" class="text-2xl md:text-3xl text-white mb-10 max-w-2xl leading-relaxed"></p>
        <button onclick="startGame()" class="px-8 py-4 bg-gradient-to-r from-yellow-600 to-yellow-400 hover:from-yellow-500 hover:to-yellow-300 text-black font-bold rounded-full text-2xl transition-transform hover:scale-105 shadow-[0_0_15px_rgba(255,215,0,0.5)]">
            שחק שוב
        </button>
    </div>

    <!-- Background Elements -->
    <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-blue-600/10 rounded-full blur-[100px]"></div>
    </div>

    <script>
        const prizes = [
            "1,000 ₪", "2,000 ₪", "4,000 ₪", "8,000 ₪", "16,000 ₪", 
            "32,000 ₪", "64,000 ₪", "125,000 ₪", "500,000 ₪", "1,000,000 ₪"
        ];

        const allQuestions = [
            {
                question: "מדוע הילדים בחבורה אספו כסף עבור סבק?",
                options: [
                    "כדי שיקנה לעצמו בגדים חדשים לחורף",
                    "כדי שילך לקולנוע ויספר להם את עלילת הסרט",
                    "כדי שיקנה תרופות לאביו החולה",
                    "כדי שיקנה לכולם ממתקים בקיוסק"
                ],
                correct: 1
            },
            {
                question: "מה סבק עשה בפועל עם הכסף שקיבל מהחברים?",
                options: [
                    "הוא הלך לקולנוע כפי שהבטיח",
                    "הוא שמר את הכסף לעצמו",
                    "הוא קנה כרטיס רכבת כדי לברוח",
                    "הוא קנה תרופה לאביו החולה"
                ],
                correct: 3
            },
            {
                question: "איזה 'תסריט' בחר סבק לספר לחבריו לאחר המקרה?",
                options: [
                    "את העלילה האמיתית של הסרט שהוקרן",
                    "תסריט שהוא המציא ודמיין בעצמו",
                    "סיפור שהוא קרא בספר ישן",
                    "סיפור על חבורת ילדים עשירים"
                ],
                correct: 1
            },
            {
                question: "כיצד הבינו החברים שסבק לא באמת הלך לקולנוע?",
                options: [
                    "הם עקבו אחריו וראו אותו הולך לבית המרקחת",
                    "הם קראו את תקציר הסרט וגילו שהוא שונה לגמרי",
                    "סבק הודה בכך מיד כשחזר",
                    "הכרטיסן בקולנוע אמר להם שהוא לא הגיע"
                ],
                correct: 1
            },
            {
                question: "מה חשבו החברים על סבק ברגע הראשון כשגילו את השוני בעלילה?",
                options: [
                    "שהוא גנב אותם ולקח את הכסף לעצמו",
                    "שהוא התבלבל באולם הקולנוע",
                    "שהוא הלך לעזור לאביו",
                    "שהוא שחקן ויוצר מוכשר מאוד"
                ],
                correct: 0
            },
            {
                question: "מי שמעה את החברים מאשימים את סבק, והתערבה כדי להגן עליו?",
                options: [
                    "המורה של החבורה",
                    "אימא של סבק",
                    "אסתושה, אחותו של סבק",
                    "שכנה שעברה ברחוב"
                ],
                correct: 2
            },
            {
                question: "מה האחות חשפה בפני החבורה?",
                options: [
                    "שסבק איבד את הכסף בדרך לקולנוע",
                    "שסבק קנה לאביהם תרופות עם הכסף שנתנו לו",
                    "שסבק נתן את הכסף לעניים",
                    "שסבק בכלל לא רצה ללכת לקולנוע"
                ],
                correct: 1
            },
            {
                question: "מדוע, לדעתכם, סבק בחר להמציא סיפור ולא אמר לחבריו את האמת?",
                options: [
                    "מפני שהוא פחד שהם יצחקו עליו",
                    "מתוך גאווה ובושה במצבו הכלכלי ובמחלת אביו",
                    "כי הוא רצה להוכיח להם שהוא תסריטאי טוב",
                    "כי הוא שכח את ההסכם איתם"
                ],
                correct: 1
            },
            {
                question: "כיצד הגיבו החברים לאחר שגילו את האמת על הכסף?",
                options: [
                    "הם כעסו ודרשו את כספם בחזרה",
                    "הם סירבו לדבר איתו יותר",
                    "הם סיפרו לכולם בבית הספר על המקרה",
                    "הם המשיכו לשלם לו והעמידו פנים שהם מאמינים לסיפוריו"
                ],
                correct: 3
            },
            {
                question: "מדוע החברים בחרו להמשיך לשלם לסבק ולהעמיד פנים?",
                options: [
                    "כדי לעזור לו לממן את התרופות לאביו מבלי לפגוע בכבודו",
                    "כי הם באמת אהבו את הסיפורים שלו יותר מהסרטים",
                    "כי הם פחדו שהוא ירביץ להם אם יפסיקו",
                    "כי האחות אסתושה הכריחה אותם לעשות זאת"
                ],
                correct: 0
            }
        ];

        let currentQuestionIndex = 0;
        let isLocked = false;

        function initLadder() {
            const ladderEl = document.getElementById('ladder');
            ladderEl.innerHTML = '';
            prizes.forEach((prize, index) => {
                const li = document.createElement('li');
                li.id = `ladder-${index}`;
                li.className = 'ladder-item px-4 py-1 flex justify-between';
                li.innerHTML = `<span>${index + 1}</span> <span>${prize}</span>`;
                ladderEl.appendChild(li);
            });
        }

        function updateLadder() {
            prizes.forEach((_, index) => {
                const li = document.getElementById(`ladder-${index}`);
                li.classList.remove('active', 'passed');
                if (index === currentQuestionIndex) {
                    li.classList.add('active');
                } else if (index < currentQuestionIndex) {
                    li.classList.add('passed');
                }
            });
        }

        function startGame() {
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('game-container').classList.remove('hidden');
            currentQuestionIndex = 0;
            initLadder();
            loadQuestion();
        }

        function loadQuestion() {
            isLocked = false;
            updateLadder();
            
            const q = allQuestions[currentQuestionIndex];
            document.getElementById('question-text').innerText = q.question;
            
            // Reset buttons
            for (let i = 0; i < 4; i++) {
                const btn = document.querySelectorAll('.answer-btn')[i];
                btn.className = 'answer-btn millionaire-shape p-4 text-lg md:text-xl font-semibold flex items-center text-right group';
                document.getElementById(`ans-${i}-text`).innerText = q.options[i];
            }
        }

        function selectAnswer(selectedIndex) {
            if (isLocked) return;
            isLocked = true;

            const buttons = document.querySelectorAll('.answer-btn');
            const selectedBtn = buttons[selectedIndex];
            const correctIndex = allQuestions[currentQuestionIndex].correct;
            
            // Add 'locked' class to prevent hover effects during animation
            buttons.forEach(btn => btn.classList.add('locked'));

            // Show selected state (Orange)
            selectedBtn.classList.add('selected');

            // Suspense timeout
            setTimeout(() => {
                selectedBtn.classList.remove('selected');
                
                if (selectedIndex === correctIndex) {
                    // Correct answer
                    selectedBtn.classList.add('correct');
                    
                    setTimeout(() => {
                        currentQuestionIndex++;
                        if (currentQuestionIndex < allQuestions.length) {
                            loadQuestion();
                        } else {
                            endGame(true);
                        }
                    }, 2500); // Wait for blinking to finish

                } else {
                    // Wrong answer
                    selectedBtn.classList.add('wrong');
                    buttons[correctIndex].classList.add('correct'); // Show correct answer
                    
                    setTimeout(() => {
                        endGame(false);
                    }, 3000);
                }
            }, 2000); // 2 seconds of suspense!
        }

        function endGame(isWin) {
            document.getElementById('game-container').classList.add('hidden');
            const endScreen = document.getElementById('end-screen');
            const endTitle = document.getElementById('end-title');
            const endMessage = document.getElementById('end-message');
            
            endScreen.classList.remove('hidden');
            endScreen.classList.add('flex');

            if (isWin) {
                endTitle.innerText = "כל הכבוד! הפכתם למיליונרים!";
                endTitle.className = "text-5xl md:text-7xl font-black mb-6 text-yellow-400 drop-shadow-[0_0_20px_rgba(255,215,0,0.8)]";
                endMessage.innerText = "הצלחתם לענות נכונה על כל השאלות והוכחתם בקיאות מרשימה בסיפור המרגש של סבק וחבריו. אצילות הנפש והחברות שניצחו בסיפור, הובילו גם אתכם לניצחון!";
            } else {
                endTitle.innerText = "המשחק נגמר...";
                endTitle.className = "text-5xl md:text-7xl font-black mb-6 text-red-500 drop-shadow-[0_0_20px_rgba(255,0,0,0.8)]";
                const prizeWon = currentQuestionIndex > 0 ? prizes[currentQuestionIndex - 1] : "0 ₪";
                endMessage.innerText = `הגעתם לשלב ה-${currentQuestionIndex + 1}. קחו רגע לחזור לטקסט ולחפש את הרמזים בסיפור "התסריט הראשון של סבק" ונסו שוב.`;
            }
        }

        // Initialize game on load
        startGame();
    </script>
</body>
</html>
